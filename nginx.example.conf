# NGINX Configuration for WhatsApp SaaS Platform
server {
    listen 80;
    server_name api.yourdomain.com; # Replace with your domain

    # Rate limiting zone (10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    # Backend API Server
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP Forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate Limiting
        limit_req zone=mylimit burst=20 nodelay;
    }

    # WhatsApp Webhooks (Needs robust timeouts)
    location /api/webhooks/whatsapp {
        proxy_pass http://localhost:5000/api/webhooks/whatsapp;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
